name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout latest from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages
        env:
          NODE_ENV: production
          NEXT_PUBLIC_FF_WAITLIST: ${{ vars.NEXT_PUBLIC_FF_WAITLIST || 'true' }}
          NEXT_PUBLIC_FF_PRICING: ${{ vars.NEXT_PUBLIC_FF_PRICING || 'false' }}
          NEXT_PUBLIC_FF_DEMO: ${{ vars.NEXT_PUBLIC_FF_DEMO || 'false' }}
          NEXT_PUBLIC_ANALYTICS_URL: ${{ vars.NEXT_PUBLIC_ANALYTICS_URL || '' }}
          NEXT_PUBLIC_ANALYTICS_DOMAIN: ${{ vars.NEXT_PUBLIC_ANALYTICS_DOMAIN || 'localhost' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=marketing-website --branch=${{ github.ref_name }}
